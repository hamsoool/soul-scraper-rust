services:
  # Web Service running Rust Axum application
  - type: web
    name: soul-scrape-rust
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # Put your Supabase transaction connection string here
      - key: SYNC_INTERVAL_HOURS
        value: 24
      - key: HTTP_TIMEOUT_SECONDS
        value: 30
      - key: MAX_PDF_SIZE_BYTES
        value: 10485760 # 10MB
      - key: PORT
        value: 8000
      - key: ENABLE_SCRAPER_SCHEDULER
        value: "false" # Disable internal scheduler when using Render Cron to avoid overlaps

  # Cron Service to run the sync binary directly
  - type: cron
    name: soul-scrape-sync-cron
    env: docker
    dockerfilePath: Dockerfile
    schedule: "0 0 * * *" # Runs daily at midnight UTC
    startCommand: "sync" # Executes the CLI sync binary in /usr/local/bin/sync
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # Put your Supabase transaction connection string here
