services:
  # Web Service running Rust Axum application
  - type: web
    name: soul-scrape-rust
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false # Put your Supabase connection string here
      - key: SYNC_INTERVAL_HOURS
        value: 24
      - key: HTTP_TIMEOUT_SECONDS
        value: 30
      - key: MAX_PDF_SIZE_BYTES
        value: 10485760 # 10MB
      - key: PORT
        value: 8000
      - key: ENABLE_SCRAPER_SCHEDULER
        value: "false" # Set to true if you want the app to periodically poll when awake, or false to rely purely on POST /sync
